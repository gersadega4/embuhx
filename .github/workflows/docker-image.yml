name: Build and Push Multiple to GHCR

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Wajib untuk push ke GHCR

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/a7k2m9x1:latest
          ghcr.io/${{ github.repository_owner }}/p3z8q1w6:latest
          ghcr.io/${{ github.repository_owner }}/x9c4v2b7:latest
          ghcr.io/${{ github.repository_owner }}/m1n8k3j6:latest
          ghcr.io/${{ github.repository_owner }}/t5r2y8u1:latest
          ghcr.io/${{ github.repository_owner }}/d7f3g9h2:latest
          ghcr.io/${{ github.repository_owner }}/q1w8e4r7:latest
          ghcr.io/${{ github.repository_owner }}/z6x2c9v1:latest
          ghcr.io/${{ github.repository_owner }}/b4n7m1k8:latest
          ghcr.io/${{ github.repository_owner }}/u2i9o3p7:latest
          ghcr.io/${{ github.repository_owner }}/s8a1d6f3:latest
          ghcr.io/${{ github.repository_owner }}/l9k2j7h4:latest
          ghcr.io/${{ github.repository_owner }}/y3t8r1e6:latest
          ghcr.io/${{ github.repository_owner }}/c2v7b9n4:latest
          ghcr.io/${{ github.repository_owner }}/h1g8f3d7:latest
          
